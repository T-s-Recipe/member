name: Build and Deploy Member

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-deploy:
    runs-on: self-hosted

    env:
      SERVICE_NAME: member

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/tsrecipe-${{ env.SERVICE_NAME }}

          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG

          echo "IMAGE_TO_DEPLOY=$IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Kubernetes rollout restart
        env:
          KUBECONFIG_PATH: ./kubeconfig
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            PROFILE="prod"
          else
            PROFILE="dev"
          fi

          sed -e "s|__PROFILE__|$PROFILE|g" \
              -e "s|__MONGO_URL__|${{ secrets.MONGO_URL }}|g" \
              k8s/secret.template.yaml | kubectl apply -f -

          sed -i "s|image: .*|image: ${{ env.IMAGE_TO_DEPLOY }}|g" k8s/${{ env.SERVICE_NAME }}.yaml

          kubectl apply -f k8s/${{ env.SERVICE_NAME }}.yaml

          kubectl rollout status deployment/${{ env.SERVICE_NAME }}

      - name: Clean Up Docker Resources
        if: always()
        run: |
          echo "Cleaning up Docker to save disk space..."
          docker system prune -af --volumes
          echo "Docker cleanup complete."