apiVersion: apps/v1
kind: Deployment
metadata:
  name: member
spec:
  replicas: 1
  selector:
    matchLabels:
      app: member
  template:
    metadata:
      labels:
        app: member
    spec:
      containers:
        - name: member
          image: jh5253/tsrecipe-member:initial
          imagePullPolicy: Always
          ports:
            - containerPort: 8020
          envFrom:
            - secretRef:
                name: member-secret
---
apiVersion: v1
kind: Service
metadata:
  name: member
spec:
  selector:
    app: member
  ports:
    - protocol: TCP
      port: 8020
      targetPort: 8020
  type: ClusterIP